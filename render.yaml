services:
  - type: web
    name: solicite
    runtime: node
    plan: starter
    buildCommand: cd artifacts/api-server && npm install --omit=dev
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        sync: false
