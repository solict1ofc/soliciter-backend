services:
  - type: web
    name: soliciter-backend
    env: node
    plan: free
    buildCommand: npm install && node artifacts/api-server/build.mjs
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
