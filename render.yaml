services:
  - type: web
    name: solicite
    runtime: node
    plan: starter
    buildCommand: npm install -g pnpm@10 && pnpm install && EXPO_PUBLIC_DOMAIN=$RENDER_EXTERNAL_HOSTNAME pnpm run render:build
    startCommand: pnpm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        sync: false
