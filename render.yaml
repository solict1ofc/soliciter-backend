services:
  - type: web
    name: solicite
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install && node build.mjs
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        sync: false
