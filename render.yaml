databases:
  - name: solicite-db
    databaseName: solicitedb
    plan: starter
    region: oregon

services:
  - type: web
    name: solicite
    runtime: node
    plan: starter
    buildCommand: cd artifacts/api-server && npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solicite-db
          property: connectionString
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        sync: false
